<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Contacts</title>
    <link rel="icon" href="assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="texture" aria-hidden="true"></div>
    <header class="app-header">
      <div class="container header-inner">
        <div class="brand-block">
          <h1 class="logo big-title">My <span class="highlight">Contact</span> Number</h1>
          <p class="tagline">Organize, search, and connect with a touch of sparkle.</p>
        </div>
        <div class="search-box" role="search" style="margin-left:auto">
          <input id="searchInput" type="text" placeholder="Search by name or number" aria-label="Search contacts" />
          <button id="voiceBtn" class="icon-btn" aria-label="Voice search" title="Voice search">
            <span class="icon">🎤</span>
          </button>
          <button id="clearSearch" class="icon-btn" aria-label="Clear search" title="Clear search">
            <span class="icon">✖</span>
          </button>
        </div>
      </div>
      <div class="container header-actions">
        <button id="openAdd" class="primary with-icon"><span class="icon">➕</span><span>Add</span></button>
        <div style="margin-left:auto; display:flex; gap:8px;">
          <button id="adminBtn" class="secondary small">Admin</button>
        </div>
        <input id="importFile" type="file" accept="application/json" class="hidden" />
      </div>
    </header>

    <main class="container main-grid">
      <section class="card hidden sheet" aria-labelledby="addContactTitle" id="addCard" role="dialog" aria-modal="true">
        <div class="sheet-header">
          <h2 id="addContactTitle">Add Contact</h2>
          <button id="closeAdd" class="icon-btn" aria-label="Close">
            <span class="icon">✖</span>
          </button>
        </div>
        <form id="addContactForm" autocomplete="on">
          <div class="form-row">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="e.g., Rahul Sharma" required />
          </div>
          <div class="form-row">
            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" inputmode="tel" placeholder="e.g., 9876543210" required />
          </div>
          <div class="form-actions">
            <button type="submit" class="primary">Save</button>
            <button type="reset" class="secondary" id="resetForm">Reset</button>
          </div>
        </form>
      </section>

      <section class="card" aria-labelledby="contactListTitle">
        <div class="list-header">
          <h2 id="contactListTitle">Contacts</h2>
        </div>
        <div id="emptyState" class="empty">No contacts yet. Add your first contact.</div>
        <ul id="contactList" class="contact-list" aria-live="polite"></ul>
      </section>
    </main>

    <button id="fabAdd" class="fab with-icon" aria-label="Add Contact"><span class="icon">➕</span></button>

    <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

    <div id="adminModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="adminTitle">
      <div class="modal-backdrop"></div>
      <div class="modal-card">
        <div class="modal-header">
          <h3 id="adminTitle">Admin Access</h3>
          <button id="adminClose" class="icon-btn" aria-label="Close"><span class="icon">✖</span></button>
        </div>
        <form id="adminForm">
          <div class="form-row">
            <label for="adminPass">Password</label>
            <input id="adminPass" type="password" placeholder="Enter admin password" required />
            <div id="adminError" class="error hidden">Wrong password. Try again.</div>
            <div id="adminSuccess" class="success hidden">Success! Admin mode enabled.</div>
          </div>
          <div class="form-actions">
            <button type="submit" class="primary">Unlock</button>
            <button type="button" id="adminCancel" class="secondary">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="app-footer">
      <div class="container">
        <div class="profile-footer">
          <div class="avatar" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="4" width="18" height="14" rx="2" ry="2" stroke="#4f8cff" stroke-width="1.5"/>
              <path d="M3 15h18" stroke="#4f8cff" stroke-width="1.5"/>
              <path d="M9 19h6" stroke="#4f8cff" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M9 9l-2 2 2 2" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 13l2-2-2-2" stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="profile-meta">
            <div class="profile-name">Ahsan Jagrala</div>
            <a class="profile-phone" href="tel:9737183896">9737183896</a>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
  </html>
